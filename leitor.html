<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leitor — Acervo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/leitor.css">
</head>
<body class="corpo-leitor">

<div class="fundo-overlay-leitor" id="overlayLeitor"></div>

<!-- ===================== BARRA DO LEITOR ===================== -->
<header class="barra-leitor">
  <div class="container barra-leitor-interna">
    <a href="index.html" class="voltar-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Acervo
    </a>

    <span class="titulo-barra-leitor" id="tituloBarraLeitor">Carregando…</span>

    <div class="controles-leitor">
      <button class="botao-controle-leitor" id="botaoTemaLeitor" aria-label="Alternar modo noturno">
        <svg class="icone-sol" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
        <svg class="icone-lua" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
      </button>
      <button class="botao-controle-leitor" id="botaoConfig" aria-label="Configurações de leitura" aria-expanded="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><text x="6" y="17" font-family="serif" font-size="15" fill="currentColor" stroke="none">Aa</text></svg>
      </button>
    </div>
  </div>
  <div class="progresso-leitura-trilha" id="trilhaProgresso"></div>
</header>

<!-- ===================== PAINEL DE CONFIGURAÇÕES ===================== -->
<aside class="painel-config-leitor" id="painelConfig" aria-label="Configurações de leitura">
  <h3>Conforto de leitura</h3>

  <div class="grupo-config">
    <label>Tamanho da fonte</label>
    <div class="controle-fonte-tamanho">
      <button class="botao-fonte menor" id="fonteMenor" aria-label="Diminuir fonte">A</button>
      <span class="valor-fonte-tamanho" id="valorFonte">18px</span>
      <button class="botao-fonte maior" id="fonteMaior" aria-label="Aumentar fonte">A</button>
    </div>
  </div>

  <div class="grupo-config">
    <label>Tipo de letra</label>
    <div class="opcoes-fonte-familia">
      <button class="opcao-pill ativo" data-fonte="serifada">Serifada</button>
      <button class="opcao-pill" data-fonte="sem-serifa">Sem serifa</button>
      <button class="opcao-pill" data-fonte="legivel">Alta legibilidade</button>
    </div>
  </div>

  <div class="grupo-config">
    <label>Espaçamento entre linhas</label>
    <input type="range" class="slider-espacamento" id="sliderEspacamento" min="1.4" max="2.4" step="0.1" value="1.8">
  </div>

  <div class="grupo-config">
    <label>Tom da página</label>
    <div class="opcoes-tema-leitura">
      <button class="opcao-tema-amostra ativo" data-temaleitura="dia" aria-label="Papel claro"></button>
      <button class="opcao-tema-amostra" data-temaleitura="sepia" aria-label="Sépia"></button>
      <button class="opcao-tema-amostra" data-temaleitura="papel-branco" aria-label="Branco"></button>
      <button class="opcao-tema-amostra" data-temaleitura="noite" aria-label="Noturno"></button>
    </div>
  </div>

  <div class="grupo-config">
    <label>Largura do texto</label>
    <div class="opcoes-largura">
      <button class="opcao-pill" data-largura="estreita">Estreita</button>
      <button class="opcao-pill ativo" data-largura="media">Média</button>
      <button class="opcao-pill" data-largura="larga">Larga</button>
    </div>
  </div>
</aside>

<!-- ===================== PALCO DE LEITURA ===================== -->
<main class="palco-leitura" id="palcoLeitura">
  <div class="frontispicio-leitura">
    <p class="categoria-frontis" id="categoriaFrontis">—</p>
    <h1 id="tituloFrontis">Carregando obra…</h1>
    <p class="autor-frontis" id="autorFrontis"></p>
  </div>

  <div class="corpo-texto-livro" id="corpoTextoLivro">
    <p>Carregando o texto…</p>
  </div>

  <div class="fim-livro-aviso">
    <p class="marca-fim">Fim do trecho disponível</p>
    <a href="index.html" class="botao-secundario">Voltar ao acervo</a>
  </div>
</main>

<script src="js/catalogo.js"></script>
<script src="js/tema.js"></script>
<script src="js/leitor.js"></script>
</body>
</html>
